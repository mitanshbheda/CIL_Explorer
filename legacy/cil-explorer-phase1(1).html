<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CIL Explorer — Phase 1 Taxonomy</title>
<style>
  :root {
    --ink: #1a1a2e;
    --ink2: #4a4a6a;
    --ink3: #8888aa;
    --bg: #f7f6f2;
    --surface: #ffffff;
    --border: #e2e0d8;
    --accent: #2d5f8a;
    --accent-light: #e8f1f8;
    --established: #0f6e56;
    --established-bg: #e1f5ee;
    --emerging: #ba7517;
    --emerging-bg: #faeeda;
    --contested: #993c1d;
    --contested-bg: #faece7;
    --tag-armed: #534AB7;
    --tag-hr: #993c1d;
    --tag-sr: #0f6e56;
    --tag-dc: #2d5f8a;
    --tag-ls: #185fa5;
    --tag-env: #3b6d11;
    --tag-uf: #85270e;
    --tag-ji: #5a3e8a;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: Georgia, serif; background: var(--bg); color: var(--ink); min-height: 100vh; }
  
  header { background: var(--ink); color: #fff; padding: 2rem 2.5rem 1.5rem; }
  header h1 { font-size: 1.6rem; font-weight: 400; letter-spacing: 0.02em; margin-bottom: 0.3rem; }
  header p { font-size: 0.85rem; color: #aaa; font-family: sans-serif; letter-spacing: 0.05em; text-transform: uppercase; }
  .header-stats { display: flex; gap: 2rem; margin-top: 1.2rem; }
  .stat { text-align: left; }
  .stat-num { font-size: 1.8rem; font-weight: 300; color: #fff; }
  .stat-label { font-size: 0.75rem; color: #888; font-family: sans-serif; text-transform: uppercase; letter-spacing: 0.05em; }

  .toolbar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 1rem 2.5rem; display: flex; gap: 1rem; align-items: center; flex-wrap: wrap; }
  .search-wrap { flex: 1; min-width: 200px; }
  .search-wrap input { width: 100%; padding: 0.5rem 0.75rem; border: 1px solid var(--border); border-radius: 4px; font-size: 0.9rem; font-family: sans-serif; background: var(--bg); color: var(--ink); }
  .search-wrap input:focus { outline: none; border-color: var(--accent); }
  select { padding: 0.5rem 0.75rem; border: 1px solid var(--border); border-radius: 4px; font-size: 0.85rem; font-family: sans-serif; background: var(--bg); color: var(--ink); cursor: pointer; }
  select:focus { outline: none; border-color: var(--accent); }
  .count-badge { font-family: sans-serif; font-size: 0.8rem; color: var(--ink3); padding: 0.4rem 0.75rem; background: var(--bg); border: 1px solid var(--border); border-radius: 4px; white-space: nowrap; }

  main { padding: 1.5rem 2.5rem; }
  
  .domain-section { margin-bottom: 2.5rem; }
  .domain-header { display: flex; align-items: baseline; gap: 0.75rem; margin-bottom: 0.75rem; padding-bottom: 0.5rem; border-bottom: 2px solid var(--border); }
  .domain-title { font-size: 1rem; font-weight: 600; font-family: sans-serif; color: var(--ink); }
  .domain-count { font-size: 0.78rem; color: var(--ink3); font-family: sans-serif; }

  .norm-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 0.75rem; }
  
  .norm-card { background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: 1rem 1.1rem; cursor: pointer; transition: border-color 0.15s, box-shadow 0.15s; position: relative; }
  .norm-card:hover { border-color: var(--accent); box-shadow: 0 2px 8px rgba(45,95,138,0.1); }
  .norm-card.expanded { border-color: var(--accent); }

  .card-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 0.5rem; margin-bottom: 0.6rem; }
  .norm-id { font-family: monospace; font-size: 0.75rem; color: var(--ink3); background: var(--bg); padding: 0.15rem 0.4rem; border-radius: 3px; white-space: nowrap; }
  .contested-flag { font-family: sans-serif; font-size: 0.7rem; background: #fff3cd; color: #856404; padding: 0.15rem 0.45rem; border-radius: 3px; border: 1px solid #ffc107; white-space: nowrap; }
  
  .norm-title { font-size: 0.95rem; color: var(--ink); line-height: 1.45; margin-bottom: 0.6rem; }
  
  .card-meta { display: flex; gap: 0.5rem; align-items: center; flex-wrap: wrap; }
  .status-badge { font-family: sans-serif; font-size: 0.72rem; padding: 0.18rem 0.55rem; border-radius: 3px; font-weight: 500; }
  .status-established { background: var(--established-bg); color: var(--established); }
  .status-emerging { background: var(--emerging-bg); color: var(--emerging); }
  .status-contested { background: var(--contested-bg); color: var(--contested); }
  
  .codification { font-family: sans-serif; font-size: 0.72rem; color: var(--ink3); }
  
  .card-expanded { margin-top: 0.75rem; padding-top: 0.75rem; border-top: 1px solid var(--border); display: none; }
  .card-expanded.show { display: block; }
  .expanded-row { display: flex; gap: 0.5rem; margin-bottom: 0.4rem; font-family: sans-serif; font-size: 0.8rem; }
  .expanded-label { color: var(--ink3); min-width: 120px; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.04em; }
  .expanded-val { color: var(--ink2); flex: 1; }
  .phase2-hint { margin-top: 0.75rem; padding: 0.6rem 0.75rem; background: var(--accent-light); border-left: 3px solid var(--accent); border-radius: 0 4px 4px 0; font-family: sans-serif; font-size: 0.78rem; color: var(--accent); }

  .domain-colors { armed_conflict: var(--tag-armed); }

  .no-results { text-align: center; padding: 3rem; color: var(--ink3); font-family: sans-serif; }

  .legend { display: flex; gap: 1.5rem; padding: 1rem 2.5rem; background: var(--surface); border-top: 1px solid var(--border); flex-wrap: wrap; }
  .legend-item { display: flex; align-items: center; gap: 0.4rem; font-family: sans-serif; font-size: 0.78rem; color: var(--ink2); }
  .legend-dot { width: 10px; height: 10px; border-radius: 2px; }

  @media (max-width: 600px) {
    header, main, .toolbar, .legend { padding-left: 1rem; padding-right: 1rem; }
    .header-stats { gap: 1rem; }
    .norm-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<header>
  <p>Customary International Law Explorer &mdash; Phase 1</p>
  <h1>Norm Taxonomy &amp; Classification</h1>
  <div class="header-stats">
    <div class="stat"><div class="stat-num">50</div><div class="stat-label">Norms</div></div>
    <div class="stat"><div class="stat-num">8</div><div class="stat-label">Domains</div></div>
    <div class="stat"><div class="stat-num" id="est-count">0</div><div class="stat-label">Established</div></div>
    <div class="stat"><div class="stat-num" id="cont-count">0</div><div class="stat-label">Contested</div></div>
  </div>
</header>

<div class="toolbar">
  <div class="search-wrap">
    <input type="text" id="search" placeholder="Search norms, cases, treaties…" oninput="render()">
  </div>
  <select id="domain-filter" onchange="render()">
    <option value="">All domains</option>
    <option value="armed_conflict">Laws of Armed Conflict / IHL</option>
    <option value="human_rights">International Human Rights</option>
    <option value="state_responsibility">State Responsibility</option>
    <option value="diplomatic_consular">Diplomatic &amp; Consular</option>
    <option value="law_of_the_sea">Law of the Sea</option>
    <option value="environment">Environmental Law</option>
    <option value="use_of_force">Use of Force</option>
    <option value="jurisdiction_immunity">Jurisdiction &amp; Immunity</option>
  </select>
  <select id="status-filter" onchange="render()">
    <option value="">All statuses</option>
    <option value="established">Established</option>
    <option value="emerging">Emerging</option>
    <option value="contested">Contested</option>
  </select>
  <select id="contested-filter" onchange="render()">
    <option value="">All norms</option>
    <option value="yes">Contested only</option>
  </select>
  <div class="count-badge" id="result-count">50 norms</div>
</div>

<main id="main-content"></main>

<div class="legend">
  <div class="legend-item"><div class="legend-dot" style="background:#e1f5ee; border:1px solid #0f6e56"></div> Established</div>
  <div class="legend-item"><div class="legend-dot" style="background:#faeeda; border:1px solid #ba7517"></div> Emerging</div>
  <div class="legend-item"><div class="legend-dot" style="background:#faece7; border:1px solid #993c1d"></div> Contested status</div>
  <div class="legend-item"><div class="legend-dot" style="background:#fff3cd; border:1px solid #ffc107"></div> Disputed norm</div>
  <div class="legend-item" style="color:#888; font-style:italic">Click any card to see full details &nbsp;&nbsp;|&nbsp;&nbsp; Phase 2: add sources &amp; summaries</div>
</div>

const DOMAIN_ORDER = ["armed_conflict","human_rights","state_responsibility","diplomatic_consular","law_of_the_sea","environment","use_of_force","jurisdiction_immunity"];

document.getElementById('est-count').textContent = NORMS.filter(n => n.status === 'established').length;
document.getElementById('cont-count').textContent = NORMS.filter(n => n.contested).length;

function render() {
  const q = document.getElementById('search').value.toLowerCase();
  const domain = document.getElementById('domain-filter').value;
  const status = document.getElementById('status-filter').value;
  const contestedOnly = document.getElementById('contested-filter').value === 'yes';

  let filtered = NORMS.filter(n => {
    if (domain && n.domain !== domain) return false;
    if (status && n.status !== status) return false;
    if (contestedOnly && !n.contested) return false;
    if (q) {
      const text = (n.title + n.norm_id + n.primary_codification + n.domain).toLowerCase();
      if (!text.includes(q)) return false;
    }
    return true;
  });

  document.getElementById('result-count').textContent = filtered.length + (filtered.length === 1 ? ' norm' : ' norms');

  const container = document.getElementById('main-content');

  if (filtered.length === 0) {
    container.innerHTML = '<div class="no-results">No norms match your filters.</div>';
    return;
  }

  // Group by domain
  const grouped = {};
  DOMAIN_ORDER.forEach(d => { grouped[d] = []; });
  filtered.forEach(n => { if (grouped[n.domain]) grouped[n.domain].push(n); });

  let html = '';
  DOMAIN_ORDER.forEach(domain => {
    const norms = grouped[domain];
    if (norms.length === 0) return;
    html += `<div class="domain-section">
      <div class="domain-header">
        <div class="domain-title">${DOMAIN_LABELS[domain]}</div>
        <div class="domain-count">${norms.length} norm${norms.length !== 1 ? 's' : ''}</div>
      </div>
      <div class="norm-grid">`;
    norms.forEach(n => {
      html += renderCard(n);
    });
    html += '</div></div>';
  });

  container.innerHTML = html;
}

function renderCard(n) {
  const statusClass = 'status-' + n.status;
  const statusLabel = n.status.charAt(0).toUpperCase() + n.status.slice(1);
  const contested = n.contested ? '<span class="contested-flag">⚑ Disputed</span>' : '';
  return `<div class="norm-card" id="card-${n.norm_id}" onclick="toggleCard('${n.norm_id}')">
    <div class="card-top">
      <span class="norm-id">${n.norm_id}</span>
      ${contested}
    </div>
    <div class="norm-title">${n.title}</div>
    <div class="card-meta">
      <span class="status-badge ${statusClass}">${statusLabel}</span>
      <span class="codification">${n.primary_codification}</span>
    </div>
    <div class="card-expanded" id="exp-${n.norm_id}">
      <div class="expanded-row"><span class="expanded-label">Domain</span><span class="expanded-val">${DOMAIN_LABELS[n.domain]}</span></div>
      <div class="expanded-row"><span class="expanded-label">Legal status</span><span class="expanded-val">${statusLabel}</span></div>
      <div class="expanded-row"><span class="expanded-label">Disputed norm</span><span class="expanded-val">${n.contested ? 'Yes — significant dissenting practice or academic dispute' : 'No'}</span></div>
      <div class="expanded-row"><span class="expanded-label">Codification</span><span class="expanded-val">${n.primary_codification}</span></div>
      <div class="phase2-hint">📋 Phase 2 tasks for this norm: add 150-word summary, 6+ primary sources, state practice entries, and opinio juris evidence.</div>
    </div>
  </div>`;
}

function toggleCard(id) {
  const exp = document.getElementById('exp-' + id);
  const card = document.getElementById('card-' + id);
  const isOpen = exp.classList.contains('show');
  exp.classList.toggle('show', !isOpen);
  card.classList.toggle('expanded', !isOpen);
}

render();
</script>
</body>
</html>
